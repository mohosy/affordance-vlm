# LoRA config for Qwen2.5-VL-7B affordance fine-tuning
# TODO Phase 4: fill in full config

base_model: Qwen/Qwen2.5-VL-7B-Instruct
output_dir: checkpoints/

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  bias: none
  task_type: CAUSAL_LM

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  num_train_epochs: 3
  bf16: true
  save_steps: 500
  logging_steps: 50
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  dataloader_num_workers: 4
  seed: 42

data:
  train_file: data/qa/train.jsonl
  max_seq_length: 2048

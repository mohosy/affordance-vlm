# LoRA config for Qwen2.5-VL-7B fine-tune on Ironsite temporal Q&A pairs
# Used by training/finetune_qwen.py

base_model: Qwen/Qwen2.5-VL-7B-Instruct
train_file: data/qa/train_temporal.jsonl
output_dir: checkpoints/

# LoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# Optimizer
learning_rate: 2.0e-4
num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0

# Saving / logging
save_steps: 200
logging_steps: 25
seed: 42

# Image config — A40 48GB tolerates 5 frames at 820x616 in bf16
# If memory tight, reduce max_pixels (e.g. 600x450 = 270000)
max_pixels: 505120
bf16: true
